name: Build Android APK

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Generate android/ scaffold
        working-directory: flutter_app
        run: flutter create --project-name read_after_me --org com.readafterme .

      - name: Bump compileSdkVersion to 36
        working-directory: flutter_app
        run: |
          sed -i 's/compileSdkVersion [0-9]\+/compileSdkVersion 36/' android/app/build.gradle
          grep compileSdkVersion android/app/build.gradle

      - name: Get Flutter dependencies
        working-directory: flutter_app
        run: flutter pub get

      - name: Build APK
        working-directory: flutter_app
        run: flutter build apk --debug

      - uses: actions/upload-artifact@v4
        with:
          name: ReadAfterMe-APK
          path: flutter_app/build/app/outputs/flutter-apk/app-debug.apk
