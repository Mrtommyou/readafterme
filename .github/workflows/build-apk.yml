name: Build Android APK

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Backup custom sources
        run: |
          mkdir -p /tmp/flutter_backup
          cp flutter_app/pubspec.yaml /tmp/flutter_backup/
          cp -r flutter_app/lib /tmp/flutter_backup/
          cp flutter_app/analysis_options.yaml /tmp/flutter_backup/ 2>/dev/null || true
          rm -rf flutter_app
          echo "Backup done"

      - name: Create fresh Flutter project
        run: flutter create --project-name read_after_me --org com.readafterme flutter_app

      - name: Restore custom Dart sources
        run: |
          cp /tmp/flutter_backup/pubspec.yaml flutter_app/pubspec.yaml
          rm -rf flutter_app/lib
          cp -r /tmp/flutter_backup/lib flutter_app/lib
          [ -f /tmp/flutter_backup/analysis_options.yaml ] && cp /tmp/flutter_backup/analysis_options.yaml flutter_app/analysis_options.yaml
          echo "Restore done"

      - name: Bump compileSdkVersion to 36 and enable cleartext
        working-directory: flutter_app
        run: |
          # Patch compileSdkVersion
          if [ -f android/app/build.gradle ]; then
            sed -i 's/compileSdkVersion [0-9]\+/compileSdkVersion 36/' android/app/build.gradle
            grep compileSdkVersion android/app/build.gradle
          elif [ -f android/app/build.gradle.kts ]; then
            sed -i 's/compileSdk\s*=\s*[0-9]\+/compileSdk = 36/' android/app/build.gradle.kts
            grep "compileSdk" android/app/build.gradle.kts
          else
            echo "ERROR: no build.gradle found!" >&2
            exit 1
          fi
          # Enable cleartext HTTP for local dev server
          manifest="android/app/src/main/AndroidManifest.xml"
          if ! grep -q "usesCleartextTraffic" "$manifest"; then
            sed -i 's|<application|<application\n        android:usesCleartextTraffic="true"|' "$manifest"
          fi
          grep "usesCleartextTraffic" "$manifest" || true

      - name: Get Flutter dependencies
        working-directory: flutter_app
        run: flutter pub get

      - name: Build APK
        working-directory: flutter_app
        run: flutter build apk --debug

      - uses: actions/upload-artifact@v4
        with:
          name: ReadAfterMe-APK
          path: flutter_app/build/app/outputs/flutter-apk/app-debug.apk
