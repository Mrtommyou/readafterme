name: CI

on:
  push:
    branches: [web-frontend]
  pull_request:
    branches: [web-frontend]
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv
        run: pip install uv
      - name: Lint with ruff
        run: uv run ruff check app/ core/ kivy_app/
